name: Reusable Code Linter

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
        default: '20'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # 1. THIS IS THE CRITICAL STEP YOU NEED
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm install
